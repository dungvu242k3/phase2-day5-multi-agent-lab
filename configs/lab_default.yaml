lab:
  name: multi-agent-research-lab
  max_iterations: 6
  timeout_seconds: 60

agents:
  supervisor:
    model: gpt-4o-mini
    temperature: 0.0
  researcher:
    model: gpt-4o-mini
    temperature: 0.2
  analyst:
    model: gpt-4o-mini
    temperature: 0.1
  writer:
    model: gpt-4o-mini
    temperature: 0.4

benchmark:
  corpus_path: data/benchmark_corpus.yaml
  case_ids:
    - graphrag_state_of_the_art
    - customer_support_workflows
    - llm_guardrails_summary
